];function analyze(msg){
  return {
    sad: msg.includes("累") || msg.includes("难过") || msg.includes("烦") || msg.includes("不开心"),
    game: msg.includes("going") || msg.includes("游戏") || msg.includes("玩") || msg.includes("黑手党"),
    chaos: msg.includes("哈哈") || msg.includes("笑") || msg.includes("ㅋㅋㅋ")
  };
}

function getReply(key, mood){
  const member = MEMBERS[key];
  if(!member) return "";
  const pool = (mood.sad && member.reply.sad) || member.reply.default;
  const text = pool[Math.floor(Math.random() * pool.length)];
  return `${member.name}：${text}`;
}

function addMessage(msgText, isPlayer = false, speakerKey = "") {
  const chat = document.getElementById("chat-scroller");
  if(!chat) return;

  const row = document.createElement("div");
  row.className = `bubble-row ${isPlayer ? 'player-row' : 'member-row'}`;
  const nameStr = speakerKey ? (MEMBERS[speakerKey] ? MEMBERS[speakerKey].name : speakerKey) : "";

  if(!isPlayer) {
    row.innerHTML = `
      <div class="bubble-avatar">${nameStr.replace("🍒", "").substring(0, 2).trim()}</div>
      <div class="bubble-content-box">
          <div class="bubble-name">${nameStr}</div>
          <div class="bubble-text">${msgText}</div>
      </div>
    `;
  } else {
    row.innerHTML = `
      <div class="bubble-content-box">
          <div class="bubble-text">${msgText}</div>
      </div>
    `;
  }
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  
  const preview = document.getElementById("list-preview-text");
  if(preview) {
    const plainName = nameStr.split(" ").pop();
    preview.innerText = isPlayer ? `💎 次14：${msgText}` : `${plainName}：${msgText}`;
  }
}

function triggerGroupReply(playerMsg){
  const mood = analyze(playerMsg);
  let i = 0;
  for (let key in MEMBERS){
    setTimeout(() => {
      const fullText = getReply(key, mood);
      const pureText = fullText.split("：")[1];
      addMessage(pureText, false, key);
    }, i * 400);
    i++;
  }
}

const pageChat = document.getElementById("page-chat");
const groupCard = document.getElementById("group-chat-card");
const backBtn = document.getElementById("btn-router-back");
const chatScroller = document.getElementById("chat-scroller");

if(groupCard && pageList && pageChat) {
    groupCard.onclick = () => {
        pageList.style.display = "none";
        pageChat.style.display = "flex";
        const badge = document.getElementById("list-unread-badge");
        if(badge) badge.style.display = "none";
        if(chatScroller) chatScroller.scrollTop = chatScroller.scrollHeight;
    };
}

if(backBtn && pageList && pageChat) {
    backBtn.onclick = () => {
        pageChat.style.display = "none";
        pageList.style.display = "flex";
    };
}

/* ========== 输入事件挂载 ========== */
const submitBtn = document.getElementById("btn-chat-submit");
const inputField = document.getElementById("chat-input-field");

if(submitBtn && inputField) {
    submitBtn.onclick = () => {
      const val = inputField.value.trim();
      if(val !== "") {
        addMessage(val, true, "PLAYER");
        inputField.value = "";
        triggerGroupReply(val);
      }
    };

    inputField.addEventListener("keydown", (e) => {
      if(e.key === "Enter") {
        e.preventDefault();
        submitBtn.onclick();
      }
    });
}
